<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Vision Detector</title>
    <style>
      #error-container {
        color: red;
        padding: 20px;
        font-family: monospace;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div id="error-container"></div>
    <div id="root"></div>
    <script>
      window.onerror = function(message, source, lineno, colno, error) {
        document.getElementById('error-container').innerText += message + '\n';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.getElementById('error-container').innerText += 'Unhandled Promise Rejection: ' + event.reason + '\n';
      });

      // Clear out old service workers from previous projects on this localhost port
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
